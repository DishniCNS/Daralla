name: Deploy Portfolio Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "tools/portfolio-generator/**"
      - "portfolio/**"
      - ".github/workflows/portfolio-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate static portfolio
        working-directory: tools/portfolio-generator
        run: python generate_portfolio.py example_projects.json --output ../../_site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
